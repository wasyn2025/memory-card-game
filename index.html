<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory card game</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Michroma&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        * {
            font-family: "Inter", sans-serif;
        }
        
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-dvh flex justify-center items-center bg-stone-900 p-5">

    <div id="card-container" class="grid grid-cols-[repeat(4,100px)] auto-rows-[150px] gap-2">
        <div class="card-wrapper">
            <div class="h-full group cursor-pointer border border-white p-3 bg-stone-800 flex items-center justify-center transition-all duration-150 hover:shadow-[0_0_15px_rgba(255,255,255,0.2)]"
                id="card" name="xh402">
                <div
                    class="text-white text-5xl font-bold opacity-75 transition-opacity duration-200 group-hover:opacity-100">
                    ?</div>
                <div class="card-back text-white text-5xl">🍌</div>
            </div>
        </div>
        <div class="card-wrapper">
            <div class="h-full group cursor-pointer border border-white p-3 bg-stone-800 flex items-center justify-center transition-all duration-150 hover:shadow-[0_0_15px_rgba(255,255,255,0.2)]"
                id="card" name="xh401">
                <div
                    class="text-white text-5xl font-bold opacity-75 transition-opacity duration-200 group-hover:opacity-100">
                    ?</div>
                <div class="card-back text-white text-5xl">🍎</div>
            </div>
        </div>
    </div>



    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>

</body>

</html>
