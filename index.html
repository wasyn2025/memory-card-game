<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory card game</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Michroma&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        * {
            font-family: "Inter", sans-serif;
        }
        
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-dvh bg-stone-900 p-5">

    <!-- header -->
    <div class="mb-5 flex items-center justify-between">
        <button id="back-button"
            class="active:scale-[0.98] bg-white flex justify-center items-center rounded-md p-2 cursor-pointer">
            <i data-lucide="arrow-left" class="size-[18px]"></i>
        </button>
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1.5 bg-amber-400 rounded-md py-2 px-3">
                <i data-lucide="medal" class="size-[18px] text-amber-900"></i>
                <span class="font-semibold text-sm text-amber-900">3500</span>
            </div>
            <div class="relative">
                <div class="flex items-center gap-1.5 bg-emerald-500 rounded-md py-2 px-3">
                    <i data-lucide="star" class="size-[18px] text-green-900"></i>
                    <span class="font-semibold text-sm text-green-900">200</span>
                </div>
                <div class="text-white p-2 w-full absolute">
                    <div id="score-info" class="text-center text-sm text-emerald-500 opacity-0">+100</div>
                </div>
            </div>
        </div>
    </div>

    <!-- main content -->
    <div id="card-container" class="grid grid-cols-[repeat(4,100px)] w-fit mx-auto auto-rows-[150px] gap-2">
    </div>

    <div
        class="cursor-pointer text-white hover:opacity-100 transition-opacity duration-200 fixed bottom-4 right-4 text-xs opacity-60">
        Assets from Pixabay
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
    <script src="script.js"></script>

</body>

</html>
