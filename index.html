<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory card game</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Michroma&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        * {
            font-family: "Inter", sans-serif;
        }
        
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-stone-900 px-5 py-3">

    <!-- header -->
    <div class="flex items-center justify-between fixed z-1 top-0 left-0 right-0 w-full px-5 py-3 bg-stone-900">
        <button id="restart"
            class="active:scale-[0.98] bg-red-500 flex justify-center items-center rounded-md p-2 cursor-pointer">
            <i data-lucide="rotate-ccw" class="size-[18px] text-red-950"></i>
        </button>
        <div class="flex items-center gap-3">
            <div title="Highscore" class="flex items-center gap-1.5 bg-blue-400 rounded-md py-2 px-3">
                <span class="text-blue-900 text-sm">Level</span>
                <span id="current-level" class="font-semibold text-sm text-blue-900">1</span>
            </div>
            <div class="relative">
                <div title="Highscore" class="flex items-center gap-1.5 bg-amber-400 rounded-md py-2 px-3">
                    <i data-lucide="trophy" class="size-[18px] text-amber-900"></i>
                    <span id="highscore-text" class="font-semibold text-sm text-amber-900">0</span>
                </div>
                <div class="text-white p-2 w-full absolute">
                    <div id="highscore-info" class="text-center text-sm text-amber-500 opacity-0">0</div>
                </div>
            </div>
            <div class="relative">
                <div title="Score" class="flex items-center gap-1.5 bg-emerald-500 rounded-md py-2 px-3">
                    <i data-lucide="tally-5" class="size-[18px] text-green-900"></i>
                    <span id="score-text" class="font-semibold text-sm text-green-900">0</span>
                </div>
                <div class="text-white p-2 w-full absolute">
                    <div id="score-info" class="text-center text-sm text-emerald-500 opacity-0">+100</div>
                </div>
            </div>
        </div>
    </div>

    <!-- main content -->
    <div id="card-container" class="grid mx-auto justify-center my-15 gap-2"
        style="grid-template-columns: repeat(4, minmax(0, 1fr));">
    </div>

    <div
        class="cursor-pointer text-white hover:opacity-100 transition-opacity duration-200 fixed bottom-4 right-4 text-xs opacity-60">
        Assets from Pixabay
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
    <script src="script.js"></script>

</body>

</html>
